<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAO · X 除草工具</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ===== SVG Background Scene ===== -->
  <div class="bg-scene">
    <svg viewBox="0 0 440 500" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Sky Gradient: blue -->
        <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#3B82F6"/>
          <stop offset="45%" stop-color="#74B9FF"/>
          <stop offset="75%" stop-color="#A8D8FF"/>
          <stop offset="100%" stop-color="#D4E9FF"/>
        </linearGradient>

        <!-- Sun glow -->
        <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0%" stop-color="#FFF7D6" stop-opacity="0.9"/>
          <stop offset="50%" stop-color="#FFE082" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="#FFE082" stop-opacity="0"/>
        </radialGradient>

        <!-- Hill gradients -->
        <linearGradient id="hillFar" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#6BBF59"/>
          <stop offset="100%" stop-color="#4A9E3A"/>
        </linearGradient>

        <linearGradient id="hillNear" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#7ED957"/>
          <stop offset="100%" stop-color="#5DBB3A"/>
        </linearGradient>

        <!-- Grass blade -->
        <path id="grass1" d="M0,0 Q-3,-12 0,-22 Q3,-12 0,0Z" fill="#5DBB3A"/>
        <path id="grass2" d="M0,0 Q-2,-10 0,-18 Q2,-10 0,0Z" fill="#6BBF59"/>
        <path id="grass3" d="M0,0 Q-1,-8 0,-14 Q1,-8 0,0Z" fill="#4A9E3A"/>

        <!-- Weed plant -->
        <g id="weed">
          <path d="M0,0 Q-4,-8 -2,-16" stroke="#3D7A2E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <path d="M0,0 Q4,-6 6,-14" stroke="#3D7A2E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <path d="M0,0 Q-6,-4 -10,-10" stroke="#3D7A2E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <path d="M0,0 Q6,-3 10,-8" stroke="#3D7A2E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <ellipse cx="0" cy="2" rx="3" ry="2" fill="#4A7C2E"/>
        </g>

        <!-- Flower -->
        <g id="flower">
          <circle cx="-4" cy="-6" r="3" fill="#60A5FA"/>
          <circle cx="4" cy="-6" r="3" fill="#60A5FA"/>
          <circle cx="0" cy="-10" r="3" fill="#60A5FA"/>
          <circle cx="-4" cy="-14" r="3" fill="#60A5FA"/>
          <circle cx="4" cy="-14" r="3" fill="#60A5FA"/>
          <circle cx="0" cy="-10" r="2.5" fill="#FDE047"/>
          <path d="M0,-6 L0,0" stroke="#6BBF59" stroke-width="1.5" fill="none"/>
        </g>

        <!-- Butterfly -->
        <g id="butterfly">
          <ellipse cx="-4" cy="0" rx="4" ry="2.5" fill="#FCD34D" opacity="0.8"/>
          <ellipse cx="4" cy="0" rx="4" ry="2.5" fill="#FCD34D" opacity="0.8"/>
          <ellipse cx="-3" cy="-3" rx="2.5" ry="1.5" fill="#F59E0B" opacity="0.6"/>
          <ellipse cx="3" cy="-3" rx="2.5" ry="1.5" fill="#F59E0B" opacity="0.6"/>
          <line x1="0" y1="-3" x2="0" y2="2" stroke="#78350F" stroke-width="0.8"/>
        </g>

        <!-- Cloud shape -->
        <g id="cloud">
          <ellipse cx="0" cy="0" rx="30" ry="14" fill="white" opacity="0.85"/>
          <ellipse cx="-22" cy="4" rx="20" ry="11" fill="white" opacity="0.85"/>
          <ellipse cx="24" cy="3" rx="18" ry="10" fill="white" opacity="0.85"/>
          <ellipse cx="-8" cy="-8" rx="18" ry="10" fill="white" opacity="0.9"/>
          <ellipse cx="12" cy="-6" rx="16" ry="9" fill="white" opacity="0.9"/>
        </g>
      </defs>

      <!-- Sky -->
      <rect width="440" height="500" fill="url(#skyGrad)"/>

      <!-- Sun -->
      <circle cx="370" cy="60" r="50" fill="url(#sunGlow)"/>
      <circle cx="370" cy="60" r="18" fill="#FFF7D6" opacity="0.9"/>

      <!-- Sun rays -->
      <g opacity="0.08" stroke="white" stroke-width="2">
        <line x1="370" y1="30" x2="370" y2="15"/>
        <line x1="370" y1="90" x2="370" y2="105"/>
        <line x1="340" y1="60" x2="325" y2="60"/>
        <line x1="400" y1="60" x2="415" y2="60"/>
        <line x1="349" y1="39" x2="339" y2="29"/>
        <line x1="391" y1="81" x2="401" y2="91"/>
        <line x1="349" y1="81" x2="339" y2="91"/>
        <line x1="391" y1="39" x2="401" y2="29"/>
      </g>

      <!-- Clouds -->
      <use href="#cloud" x="60" y="55" opacity="0.7">
        <animateTransform attributeName="transform" type="translate" values="0,0;15,0;8,0;0,0" dur="18s" repeatCount="indefinite"/>
      </use>
      <use href="#cloud" x="220" y="40" opacity="0.6" transform="scale(0.8)">
        <animateTransform attributeName="transform" type="translate" values="0,0;-12,0;-5,0;0,0" dur="22s" repeatCount="indefinite"/>
      </use>
      <use href="#cloud" x="340" y="80" opacity="0.5" transform="scale(1.1)">
        <animateTransform attributeName="transform" type="translate" values="0,0;10,0;4,0;0,0" dur="15s" repeatCount="indefinite"/>
      </use>

      <!-- Far hills -->
      <path d="M0,250 Q70,210 150,230 Q230,200 310,225 Q370,210 440,240 L440,500 L0,500 Z" fill="url(#hillFar)"/>
      <path d="M0,270 Q120,220 260,250 Q340,230 440,260 L440,500 L0,500 Z" fill="url(#hillNear)"/>

      <!-- ===== Grass blades (foreground) ===== -->
      <g>
        <use href="#grass1" x="30" y="305" transform="rotate(-5,30,305)">
          <animateTransform attributeName="transform" type="rotate" values="-5,30,305;-2,30,305;-5,30,305" dur="3s" repeatCount="indefinite"/>
        </use>
        <use href="#grass2" x="50" y="310" transform="rotate(3,50,310)">
          <animateTransform attributeName="transform" type="rotate" values="3,50,310;6,50,310;3,50,310" dur="3.5s" repeatCount="indefinite"/>
        </use>
        <use href="#grass3" x="75" y="300" transform="rotate(-2,75,300)">
          <animateTransform attributeName="transform" type="rotate" values="-2,75,300;1,75,300;-2,75,300" dur="4s" repeatCount="indefinite"/>
        </use>
        <use href="#grass1" x="100" y="308" transform="rotate(4,100,308)">
          <animateTransform attributeName="transform" type="rotate" values="4,100,308;7,100,308;4,100,308" dur="2.8s" repeatCount="indefinite"/>
        </use>
        <use href="#grass2" x="130" y="295" transform="rotate(-6,130,295)">
          <animateTransform attributeName="transform" type="rotate" values="-6,130,295;-3,130,295;-6,130,295" dur="3.2s" repeatCount="indefinite"/>
        </use>
        <use href="#grass3" x="155" y="305" transform="rotate(2,155,305)">
          <animateTransform attributeName="transform" type="rotate" values="2,155,305;5,155,305;2,155,305" dur="3.7s" repeatCount="indefinite"/>
        </use>
        <use href="#grass1" x="180" y="298" transform="rotate(-3,180,298)">
          <animateTransform attributeName="transform" type="rotate" values="-3,180,298;0,180,298;-3,180,298" dur="4.2s" repeatCount="indefinite"/>
        </use>
        <use href="#grass2" x="210" y="310" transform="rotate(5,210,310)">
          <animateTransform attributeName="transform" type="rotate" values="5,210,310;8,210,310;5,210,310" dur="3s" repeatCount="indefinite"/>
        </use>
        <use href="#grass3" x="235" y="300" transform="rotate(-4,235,300)">
          <animateTransform attributeName="transform" type="rotate" values="-4,235,300;-1,235,300;-4,235,300" dur="3.8s" repeatCount="indefinite"/>
        </use>
        <use href="#grass1" x="350" y="305" transform="rotate(3,350,305)">
          <animateTransform attributeName="transform" type="rotate" values="3,350,305;6,350,305;3,350,305" dur="3.1s" repeatCount="indefinite"/>
        </use>
        <use href="#grass2" x="380" y="298" transform="rotate(-5,380,298)">
          <animateTransform attributeName="transform" type="rotate" values="-5,380,298;-2,380,298;-5,380,298" dur="3.6s" repeatCount="indefinite"/>
        </use>
        <use href="#grass3" x="400" y="308" transform="rotate(2,400,308)">
          <animateTransform attributeName="transform" type="rotate" values="2,400,308;5,400,308;2,400,308" dur="4s" repeatCount="indefinite"/>
        </use>
        <use href="#grass1" x="420" y="302" transform="rotate(-4,420,302)">
          <animateTransform attributeName="transform" type="rotate" values="-4,420,302;-1,420,302;-4,420,302" dur="3.3s" repeatCount="indefinite"/>
        </use>
      </g>

      <!-- ===== The Good Flowers (not pulled) ===== -->
      <g transform="translate(0, -110)">
      <use href="#flower" x="150" y="275"/>
      <use href="#flower" x="190" y="282" transform="scale(0.8)"/>
      <use href="#flower" x="385" y="280"/>
      </g>

      <!-- ===== Weeds (to be removed) ===== -->
      <g transform="translate(0, -110)">
      <use href="#weed" x="245" y="278"/>
      <use href="#weed" x="220" y="290" transform="scale(0.7)"/>
      <use href="#weed" x="330" y="285" transform="scale(0.8)"/>
      </g>

      <!-- ===== Weed being pulled (animated) ===== -->
      <g transform="translate(0, -110)">
        <use href="#weed" x="265" y="262">
          <animateTransform attributeName="transform" type="translate" values="0,0;-1,1;1,-1;0,2;0,0" dur="2.5s" repeatCount="indefinite"/>
        </use>
      </g>

      <!-- ===== Butterfly ===== -->
      <use href="#butterfly" x="80" y="160">
        <animateTransform attributeName="transform" type="translate"
          values="80,160;100,145;125,152;140,142;115,148;80,160"
          dur="12s" repeatCount="indefinite"/>
      </use>

    </svg>
  </div>

  <!-- ===== Character Overlay ===== -->
  <div class="character-overlay">
    <img src="sheeta_character.png" alt="Sheeta" class="character-img" />
  </div>

  <!-- ===== UI Overlay ===== -->
  <div class="ui-overlay">

    <div class="glass-card">

      <!-- Header -->
      <div class="header">
        <span class="header-logo">🌱 CAO</span>
      </div>

      <!-- Toggle: Hide Ads -->
      <label class="toggle-row">
        <span class="toggle-left">
          <span class="toggle-icon">🌿</span>
          <span class="toggle-label">隐藏广告</span>
        </span>
        <span class="toggle-switch">
          <input type="checkbox" id="hideAdCheckbox" checked />
          <span class="toggle-slider"></span>
        </span>
      </label>

      <!-- Toggle: Hide Spam -->
      <label class="toggle-row">
        <span class="toggle-left">
          <span class="toggle-icon">🌱</span>
          <span class="toggle-label">隐藏垃圾内容</span>
        </span>
        <span class="toggle-switch">
          <input type="checkbox" id="hideGarbageCheckbox" checked />
          <span class="toggle-slider"></span>
        </span>
      </label>

      <!-- Button -->
      <button class="btn-main" id="reportBtn">
        <span class="btn-icon">⚔</span>
        屏蔽管理
      </button>

      <!-- Footer -->
      <div class="footer">
        Powered&nbsp;By&nbsp;
        <a href="https://x.com/fuckxegg2" target="_blank" rel="noopener noreferrer" class="footer-link">草</a>
      </div>

    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
