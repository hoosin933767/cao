<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAO · X 除草工具</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <div class="ui-wrap">

    <!-- Header -->
    <div class="header">
      <span class="header-logo">CAO</span>
      <span class="header-logo-sub">X Cleaner</span>
    </div>

    <!-- Settings Card -->
    <div class="card">

      <!-- Toggle: Hide Ads -->
      <label class="toggle-row">
        <span class="toggle-label">
          隐藏广告
          <span class="toggle-hint">Ad Block</span>
        </span>
        <span class="toggle-switch">
          <input type="checkbox" id="hideAdCheckbox" checked />
          <span class="toggle-slider"></span>
        </span>
      </label>

      <!-- Toggle: Auto Block -->
      <label class="toggle-row">
        <span class="toggle-label">
          自动屏蔽
          <span class="toggle-hint">Auto Block</span>
        </span>
        <span class="toggle-switch">
          <input type="checkbox" id="autoBlockCheckbox" checked />
          <span class="toggle-slider"></span>
        </span>
      </label>

      <!-- Button -->
      <button class="btn-main" id="reportBtn">
        屏蔽管理
      </button>

      <!-- Footer -->
      <div class="footer">
        Powered By
        <a href="https://x.com/fuckxegg2" target="_blank" rel="noopener noreferrer" class="footer-link">草</a>
      </div>

    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
